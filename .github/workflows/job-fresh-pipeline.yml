name: job-fresh pipeline

on:
  schedule:
    - cron: '0 22 * * *'  # KST 매일 오전 7시 (전날 22:00 UTC) — 온보딩 스크립트가 지터 오프셋 배정 예정
  workflow_dispatch:      # Actions 탭에서 수동 실행 (셀프테스트용)

permissions:
  contents: write  # 수집 결과를 기본 브랜치에 직접 커밋/푸시 (GITHUB_TOKEN, 추가 시크릿 불필요)
  id-token: write  # Lambda AI 프록시 OIDC 인증 — AI 연결 전까지는 미사용

concurrency:
  group: job-fresh-pipeline
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 당일 공고 수집
        run: python src/pipeline.py

      - name: 14일 경과 폴더 삭제
        run: |
          if [ -d jobs ]; then
            cutoff=$(TZ=Asia/Seoul date -d '14 days ago' +%Y-%m-%d)
            for dir in jobs/*/; do
              [ -d "$dir" ] || continue
              day=$(basename "$dir")
              # 폴더명이 날짜(YYYY-MM-DD)이고 보존 기한(14일)을 지났으면 폴더째 삭제
              if [[ "$day" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] && [[ ! "$day" > "$cutoff" ]]; then
                rm -rf "$dir"
                echo "삭제: $dir"
              fi
            done
          fi

      - name: 커밋 및 푸시
        run: |
          if [ ! -d jobs ]; then
            echo "jobs/ 없음(저장·삭제된 공고 0건) — 커밋 생략"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jobs/
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
            exit 0
          fi
          git commit -m "Collect jobs: $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git pull --rebase  # 동시 실행 충돌 방지 (concurrency 그룹과 이중 안전장치)
          git push
