<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>job-fresh 필터 생성기</title>
<style>
  :root {
    --bg: #ffffff;
    --panel: #ffffff;
    --panel-2: #f5f6f8;
    --selected: #eef0f3;
    --border: #e4e6eb;
    --accent: #389fff;
    --accent-bg: #eaf4ff;
    --accent-border: #389fff;
    --accent-text: #1f7ae0;
    --text: #16181d;
    --text-secondary: #3f434b;
    --muted: #767b87;
    --radius-lg: 16px;
    --radius-md: 8px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; }
  @font-face {
    font-family: "Pretendard Variable";
    font-weight: 45 920;
    font-style: normal;
    font-display: swap;
    src: url("fonts/PretendardVariable.woff2") format("woff2-variations");
  }
  body {
    margin: 0;
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .wrap { max-width: 1440px; margin: 0 auto; padding: 28px 20px 60px; }

  .layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 420px;
    gap: 24px;
    align-items: start;
  }
  .picker-col { min-width: 0; }
  .output-col {
    position: sticky;
    top: 28px;
    align-self: start;
    max-height: calc(100vh - 56px);
    display: flex;
    flex-direction: column;
  }

  .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .topbar h1 { font-size: 1.15rem; margin: 0; font-weight: 700; }
  .lead { color: var(--muted); font-size: 0.88rem; margin: 10px 0 22px; }
  .lead code, .steps code {
    background: var(--panel-2); border: 1px solid var(--border); padding: 1px 6px;
    border-radius: 5px; color: var(--text);
    font-family: Consolas, ui-monospace, monospace;
  }

  .picker {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: 0 1px 2px rgba(16,24,40,0.04), 0 1px 3px rgba(16,24,40,0.06);
    overflow: hidden;
  }
  .picker-body { display: flex; min-height: 480px; }

  .tabs {
    width: 190px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 14px 10px;
  }
  .tab {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 14px;
    border-radius: var(--radius-md);
    cursor: pointer;
    font-size: 0.92rem;
    color: var(--muted);
    margin-bottom: 2px;
    user-select: none;
  }
  .tab:hover { color: var(--text); }
  .tab .n { font-size: 0.78rem; color: var(--accent); font-weight: 600; }

  .content { flex: 1; display: flex; min-width: 0; }

  /* 직무: 대분류 서브컬럼 */
  .subcats {
    width: 200px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 14px 10px;
    overflow-y: auto;
    max-height: 480px;
  }
  .subcat {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px;
    border-radius: var(--radius-md);
    cursor: pointer;
    font-size: 0.88rem;
    color: var(--muted);
    margin-bottom: 2px;
    user-select: none;
  }
  .subcat:hover { color: var(--text); }
  .subcat .n { font-size: 0.76rem; color: var(--accent); font-weight: 600; }

  .tab, .subcat { font-weight: 400; color: var(--text); }
  .tab.active, .subcat.active { background: var(--selected); font-weight: 400; }

  .options { flex: 1; padding: 18px 20px; overflow-y: auto; max-height: 480px; }
  .options-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .options-head .icon {
    width: 36px; height: 36px; border-radius: var(--radius-sm);
    background: var(--accent); display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }
  .options-head h2 { margin: 0; font-size: 1rem; }
  .options-hint { font-size: 0.78rem; color: var(--muted); margin: -8px 0 14px; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chips--roomy { gap: 10px; }
  .chips--roomy .chip { padding: 12px 20px; }
  .chip {
    display: inline-flex; align-items: center;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    user-select: none;
    background: var(--selected);
    border: 0.8px solid transparent;
    color: var(--text-secondary);
    transition: background .1s, color .1s, border-color .1s;
  }
  .chip.checked { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent-text); }
  .chip input { display: none; }

  .career-value { font-size: 0.9rem; color: var(--text); font-weight: 600; margin-bottom: 10px; }

  .career-open-check {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 12px; font-size: 0.875rem; font-weight: 500;
    color: var(--text-secondary); cursor: pointer; user-select: none;
  }
  .career-open-check input {
    width: 16px; height: 16px; margin: 0;
    accent-color: var(--accent); cursor: pointer;
  }

  .range-slider { position: relative; height: 20px; margin: 0 0 6px; }
  .range-track-bg {
    position: absolute; top: 50%; left: 0; right: 0; height: 4px;
    transform: translateY(-50%);
    background: var(--selected); border-radius: 999px;
  }
  .range-track-fill {
    position: absolute; top: 50%; height: 4px;
    transform: translateY(-50%);
    background: var(--accent); border-radius: 999px;
  }
  .range-slider input[type=range] {
    position: absolute; top: 50%; left: 0; width: 100%;
    transform: translateY(-50%);
    margin: 0; background: transparent;
    pointer-events: none;
    -webkit-appearance: none; appearance: none;
  }
  .range-slider input[type=range]::-webkit-slider-runnable-track { height: 4px; background: transparent; }
  .range-slider input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; pointer-events: auto;
    width: 18px; height: 18px; margin-top: -7px;
    border-radius: 50%; background: var(--panel);
    border: 2px solid var(--accent);
    box-shadow: 0 1px 2px rgba(16,24,40,0.18);
    cursor: pointer;
  }
  .range-slider input[type=range]::-moz-range-track { height: 4px; background: transparent; border: none; }
  .range-slider input[type=range]::-moz-range-thumb {
    pointer-events: auto;
    width: 18px; height: 18px;
    border-radius: 50%; background: var(--panel);
    border: 2px solid var(--accent);
    box-shadow: 0 1px 2px rgba(16,24,40,0.18);
    cursor: pointer;
  }

  /* 하단 요약 바 */
  .summary-bar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    background: var(--panel-2);
  }
  .summary-chips { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; min-width: 0; }
  .summary-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent-bg); border: 0.8px solid var(--accent-border);
    color: var(--accent-text); border-radius: var(--radius-sm); padding: 6px 8px 6px 12px;
    font-size: 0.8125rem;
    font-weight: 600;
  }
  .summary-chip button {
    background: none; border: none; color: var(--accent-text); cursor: pointer;
    font-size: 0.85rem; line-height: 1; padding: 2px;
  }
  .summary-empty { color: var(--muted); font-size: 0.82rem; }
  .reset-btn {
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 18px; font-size: 0.85rem; cursor: pointer; flex-shrink: 0;
    background: var(--panel); color: var(--muted);
  }
  .reset-btn:hover { color: var(--text); }

  .output-card {
    margin-top: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: 0 1px 2px rgba(16,24,40,0.04), 0 1px 3px rgba(16,24,40,0.06);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .output-card h2 { margin: 0 0 4px; font-size: 0.95rem; }
  .steps { font-size: 0.83rem; color: var(--muted); margin: 6px 0 14px; }
  .steps ol { margin: 6px 0 0; padding-left: 20px; }
  textarea#output {
    width: 100%; min-height: 160px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.78rem;
    padding: 12px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    resize: vertical;
  }
  .output-card textarea#output { flex: 1; min-height: 320px; }

  .output-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .output-card-head h2 { margin: 0; }

  .icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--muted);
    cursor: pointer;
    transition: background .1s, color .1s, border-color .1s;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--accent-border); }
  .icon-btn:active { opacity: .85; }

  #copy-msg { font-size: 0.75rem; color: var(--accent); }

  @media (max-width: 1180px) {
    .layout { grid-template-columns: minmax(0, 1fr) 360px; gap: 20px; }
  }
  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
    .output-col { position: static; max-height: none; }
    .output-card { margin-top: 18px; }
  }

  @media (max-width: 720px) {
    .picker-body { flex-direction: column; }
    .tabs { width: 100%; display: flex; overflow-x: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .tab { flex-shrink: 0; }
    .content { flex-direction: column; }
    .subcats { width: 100%; max-height: 220px; border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>job-fresh 필터 생성기</h1>
  </div>
  <p class="lead">
    조건을 선택하면 <code>filters.json</code>이 자동으로 만들어집니다.
    아무것도 선택하지 않은 항목은 &ldquo;전체&rdquo;로 처리됩니다.
  </p>

  <div class="layout">
    <div class="picker-col">
      <div class="picker">
        <div class="picker-body">
          <div class="tabs" id="tabs"></div>
          <div class="content" id="content"></div>
        </div>
        <div class="summary-bar">
          <div class="summary-chips" id="summary-chips"></div>
          <button class="reset-btn" id="reset-btn" type="button">↺ 초기화</button>
        </div>
      </div>
    </div>

    <div class="output-col">
      <div class="output-card">
        <div class="output-card-head">
          <h2>JSON Output</h2>
          <button class="icon-btn" id="copy-btn" type="button" title="복사" aria-label="JSON 복사">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
        <span id="copy-msg"></span>
        <div class="steps">
          <ol>
            <li>위 &ldquo;복사&rdquo; 버튼으로 내용을 복사합니다.</li>
            <li>fork한 저장소에서 <code>filters.json</code> 파일을 웹 에디터(연필 아이콘)로 엽니다.</li>
            <li>전체 내용을 지우고 붙여넣은 뒤 커밋합니다.</li>
          </ol>
        </div>
        <textarea id="output" readonly spellcheck="false"></textarea>
      </div>
    </div>
  </div>
</div>

<script>

  {name:"건설_건축", displayName:"건설·건축", depthTwos:["건축설계_시공","토목_측량_조경_환경","기계_전기_소방_설비","설계_감리_시공_공무","안전_품질_재료","사무_관리_전산","건설특수_일용직","기타건설_건축"]},

  {name:"의료_보건", displayName:"의료·보건", depthTwos:["의사","한의사","수의사","약사_약무보조","간호사","간호조무사","치위생사","응급구조사","물리치료_작업치료","영상의학_임상병리_검사","영양사_임상영양사","의료미용_에스테틱","병원행정_접수_수납","요양보호사","조리원","안경_검안사","기타의료_보건"]},
  {name:"공공_복지", displayName:"공공·복지", depthTwos:["행정_사무_운영","기술_전산_시설","복지_사회서비스","교육_연구","공공안전","상담_심리","종교","아동_청소년복지","노인_여성복지","자원봉사","기타공공_복지"]},
  {name:"교육", displayName:"교육", depthTwos:["유치원_보육교사","기간제_사립교사","방과후_시간교사","대학교수_강사","교직원_조교","입시학원강사","국어_외국어강사","기술_전문강사","학습지_방문교사","학원상담_운영","교재개발_교수설계","기타교육"]},
  {name:"미디어_엔터_방송", displayName:"미디어·엔터", depthTwos:["PD_감독","콘텐츠기획_에디터","방송작가","촬영감독_카메라","영상편집","CG_모션그래픽","사운드디자이너","기자_리포터","아나운서_쇼호스트","성우_나래이터","크리에이터_인플루언서","모델_연기자","사진작가","방송기술_중계","송출_편성","아티스트매니지먼트","배급_제작사","음원_음반","웹툰_웹소설","출판","통_번역","전시기획_큐레이터","기타미디어_엔터"]},
  {name:"고객상담_TM", displayName:"고객상담·TM", depthTwos:["인바운드","아웃바운드","CS","CX매니저","기타고객상담"]},
  {name:"서비스", displayName:"서비스", depthTwos:["설치_수리기사","주차_주유","가사도우미","애견미용_훈련","경호_경비","호텔서비스","관광서비스","항공서비스","매장관리","안내_리셉션","헤어디자이너","메이크업_네일","피부관리","마사지_체형관리","웨딩플래너","환경미화원","기타서비스"]},
  {name:"식음료", displayName:"식음료", depthTwos:["식품가공_개발","주방조리","제과_제빵","음료_주류","매장운영","서비스_홀스태프","식음컨설팅_지원","기타식음료"]}
];

const REGIONS = ["서울","경기","인천","부산","대구","광주","대전","울산","세종","강원","경남","경북","전남","전북","충남","충북","제주","해외"];
const EMPLOYEE_TYPES = ["체험형인턴","전환형인턴","정규직","계약직","일용직","프리랜서","병역특례"];
const EDUCATIONS = ["무관","고졸","전문대졸","학사","석사","박사"];
const COMPANY_TYPES = ["대기업","유니콘","스타트업","중견기업","중소기업","공공기관","외국계"];
const DEADLINE_TYPES = ["마감일","상시채용","채용시마감"];
const FILTERS_SCHEMA_VERSION = 1;
const CAREER_MAX = 10;

const state = {
  depthTwos: new Set(),
  regions: new Set(),
  employeeTypes: new Set(),
  educations: new Set(),
  companyTypes: new Set(),
  deadlineTypes: new Set(),
  // 기본값: 0~10(전 범위) + 경력무관 포함 = 경력 필터 없음
  careerMin: 0,
  careerMax: CAREER_MAX,
  includeCareerOpen: true,
};

function careerIsDefault() {
  return state.careerMin === 0 && state.careerMax === CAREER_MAX && state.includeCareerOpen;
}

const TABS = [
  { id: "job", label: "직무" },
  { id: "career", label: "경력" },
  { id: "employeeTypes", label: "채용 유형" },
  { id: "regions", label: "지역" },
  { id: "educations", label: "학력" },
  { id: "companyTypes", label: "기업 규모" },
  { id: "deadlineTypes", label: "마감 유형" },
];

const CHIP_LISTS = {
  employeeTypes: EMPLOYEE_TYPES,
  regions: REGIONS,
  educations: EDUCATIONS,
  companyTypes: COMPANY_TYPES,
  deadlineTypes: DEADLINE_TYPES,
};

let activeTab = "job";
let activeJobCat = JOB_CATEGORIES[0].name;

function el(tag, attrs, children) {
  const node = document.createElement(tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (k === "text") node.textContent = v;
    else node.setAttribute(k, v);
  }
  if (children) for (const c of children) node.appendChild(c);
  return node;
}

function tabCount(id) {
  if (id === "job") return state.depthTwos.size;
  if (id === "career") return careerIsDefault() ? 0 : 1;
  return state[id].size;
}

function renderTabs() {
  const container = document.getElementById("tabs");
  container.innerHTML = "";
  TABS.forEach((t) => {
    const n = tabCount(t.id);
    const tab = el("div", { class: "tab" + (activeTab === t.id ? " active" : "") }, [
      document.createTextNode(t.label),
      el("span", { class: "n", text: n > 0 ? String(n) : "" }),
    ]);
    tab.addEventListener("click", () => { activeTab = t.id; renderAll(); });
    container.appendChild(tab);
  });
}

function chip(label, checked, onChange) {
  const input = el("input", { type: "checkbox" });
  input.checked = checked;
  const wrap = el("label", { class: "chip" + (checked ? " checked" : "") }, [
    input, document.createTextNode(label),
  ]);
  input.addEventListener("change", () => {
    wrap.classList.toggle("checked", input.checked);
    onChange(input.checked);
  });
  wrap._setChecked = (v) => { input.checked = v; wrap.classList.toggle("checked", v); };
  return wrap;
}

// values 전체를 다루는 "전체" 칩 + 개별 칩을 함께 만든다.
// "전체" 클릭 시 그룹 내 모든 값이 한꺼번에 targetSet에 포함/제외된다
// (개별 항목을 하나도 선택하지 않았을 때 전체로 취급하는 것과는 무관한 별도 동작).
function buildPickGroup(values, targetSet, labelFn, afterChange) {
  const container = el("div", { class: "chips" });
  const itemChips = [];

  const isAllChecked = () => values.length > 0 && values.every((v) => targetSet.has(v));
  const syncAll = () => allChip._setChecked(isAllChecked());

  const allChip = chip("전체", isAllChecked(), (checked) => {
    values.forEach((v) => { if (checked) targetSet.add(v); else targetSet.delete(v); });
    itemChips.forEach(({ node, val }) => node._setChecked(targetSet.has(val)));
    afterChange();
  });
  container.appendChild(allChip);

  values.forEach((val) => {
    const node = chip(labelFn(val), targetSet.has(val), (checked) => {
      if (checked) targetSet.add(val); else targetSet.delete(val);
      syncAll();
      afterChange();
    });
    itemChips.push({ node, val });
    container.appendChild(node);
  });

  return container;
}

function renderJobPane(container) {
  const subcats = el("div", { class: "subcats" });
  let activeBadge = null;
  JOB_CATEGORIES.forEach((cat) => {
    const n = cat.depthTwos.filter((v) => state.depthTwos.has(v)).length;
    const badge = el("span", { class: "n", text: n > 0 ? String(n) : "" });
    const item = el("div", { class: "subcat" + (activeJobCat === cat.name ? " active" : "") }, [
      document.createTextNode(cat.displayName),
      badge,
    ]);
    if (activeJobCat === cat.name) activeBadge = badge;
    item.addEventListener("click", () => { activeJobCat = cat.name; renderContent(); });
    subcats.appendChild(item);
  });

  const cat = JOB_CATEGORIES.find((c) => c.name === activeJobCat);
  const chips = buildPickGroup(cat.depthTwos, state.depthTwos, (v) => v.replace(/_/g, "·"), () => {
    renderTabs();
    renderSummary();
    updateOutput();
    if (activeBadge) {
      const n = cat.depthTwos.filter((v) => state.depthTwos.has(v)).length;
      activeBadge.textContent = n > 0 ? String(n) : "";
    }
  });
  const options = el("div", { class: "options" }, [
    el("div", { class: "options-head" }, [
      el("div", { class: "icon", text: "💼" }),
      el("h2", { text: cat.displayName }),
    ]),
    el("p", { class: "options-hint", text: "여러 개 선택 가능(OR 조건)" }),
    chips,
  ]);

  container.appendChild(subcats);
  container.appendChild(options);
}

function renderCareerPane(container) {
  const valueLabel = el("div", { class: "career-value" });
  const fill = el("div", { class: "range-track-fill" });
  const minInput = el("input", { type: "range", min: "0", max: String(CAREER_MAX), step: "1", value: String(state.careerMin) });
  const maxInput = el("input", { type: "range", min: "0", max: String(CAREER_MAX), step: "1", value: String(state.careerMax) });

  const updateLabel = () => {
    if (state.careerMin === 0 && state.careerMax === 0) {
      valueLabel.textContent = "신입";
      return;
    }
    const maxLabel = state.careerMax >= CAREER_MAX ? `${CAREER_MAX}년 이상` : `${state.careerMax}년`;
    valueLabel.textContent = `${state.careerMin}년 ~ ${maxLabel}`;
  };

  const updateFill = () => {
    const lo = Math.min(state.careerMin, state.careerMax);
    const hi = Math.max(state.careerMin, state.careerMax);
    fill.style.left = `${(lo / CAREER_MAX) * 100}%`;
    fill.style.width = `${((hi - lo) / CAREER_MAX) * 100}%`;
  };

  const sync = (movedInput) => {
    let lo = Number(minInput.value);
    let hi = Number(maxInput.value);
    if (lo > hi) {
      if (movedInput === "min") { hi = lo; maxInput.value = String(hi); }
      else { lo = hi; minInput.value = String(lo); }
    }
    state.careerMin = lo;
    state.careerMax = hi;
    updateFill();
    updateLabel();
    renderTabs();
    renderSummary();
    updateOutput();
  };

  minInput.addEventListener("input", () => sync("min"));
  maxInput.addEventListener("input", () => sync("max"));

  const openCheckbox = el("input", { type: "checkbox" });
  openCheckbox.checked = state.includeCareerOpen;
  openCheckbox.addEventListener("change", () => {
    state.includeCareerOpen = openCheckbox.checked;
    renderTabs();
    renderSummary();
    updateOutput();
  });
  const openCheck = el("label", { class: "career-open-check" }, [
    openCheckbox,
    document.createTextNode("경력 무관 포함"),
  ]);

  const slider = el("div", { class: "range-slider" }, [
    el("div", { class: "range-track-bg" }),
    fill,
    minInput,
    maxInput,
  ]);

  updateFill();
  updateLabel();

  const options = el("div", { class: "options" }, [
    el("div", { class: "options-head" }, [
      el("div", { class: "icon", text: "📈" }),
      el("h2", { text: "경력" }),
    ]),
    valueLabel,
    slider,
    el("p", { class: "options-hint", text: "핸들을 드래그해 범위를 조절하세요 · 둘 다 0이면 신입만" }),
    openCheck,
  ]);
  container.appendChild(options);
}

function renderChipPane(container, tabId, label, icon) {
  const list = CHIP_LISTS[tabId];
  const chips = buildPickGroup(list, state[tabId], (v) => v, () => {
    renderTabs();
    renderSummary();
    updateOutput();
  });
  chips.classList.add("chips--roomy");
  const options = el("div", { class: "options" }, [
    el("div", { class: "options-head" }, [
      el("div", { class: "icon", text: icon }),
      el("h2", { text: label }),
    ]),
    el("p", { class: "options-hint", text: "여러 개 선택 가능(OR 조건)" }),
    chips,
  ]);
  container.appendChild(options);
}

function renderContent() {
  const container = document.getElementById("content");
  container.innerHTML = "";
  if (activeTab === "job") renderJobPane(container);
  else if (activeTab === "career") renderCareerPane(container);
  else {
    const meta = { employeeTypes: ["채용 유형", "🧑‍💻"], regions: ["지역", "📍"], educations: ["학력", "🎓"], companyTypes: ["기업 규모", "🏢"], deadlineTypes: ["마감 유형", "⏰"] }[activeTab];
    renderChipPane(container, activeTab, meta[0], meta[1]);
  }
}

function removeAllInTab(id) {
  if (id === "job") state.depthTwos.clear();
  else if (id === "career") { state.careerMin = 0; state.careerMax = CAREER_MAX; state.includeCareerOpen = true; }
  else state[id].clear();
}

function renderSummary() {
  const container = document.getElementById("summary-chips");
  container.innerHTML = "";
  const entries = [];
  if (state.depthTwos.size > 0) entries.push(["job", `직무 ${state.depthTwos.size}개`]);
  if (!careerIsDefault()) {
    const parts = [];
    if (state.careerMin !== 0 || state.careerMax !== CAREER_MAX) {
      if (state.careerMin === 0 && state.careerMax === 0) parts.push("경력 신입");
      else if (state.careerMax >= CAREER_MAX) parts.push(`경력 ${state.careerMin}년 이상`);
      else parts.push(`경력 ${state.careerMin}~${state.careerMax}년`);
    }
    if (!state.includeCareerOpen) parts.push("무관 제외");
    entries.push(["career", parts.join(" · ")]);
  }
  if (state.employeeTypes.size > 0) entries.push(["employeeTypes", `채용유형 ${state.employeeTypes.size}개`]);
  if (state.regions.size > 0) entries.push(["regions", `지역 ${state.regions.size}개`]);
  if (state.educations.size > 0) entries.push(["educations", `학력 ${state.educations.size}개`]);
  if (state.companyTypes.size > 0) entries.push(["companyTypes", `기업규모 ${state.companyTypes.size}개`]);
  if (state.deadlineTypes.size > 0) entries.push(["deadlineTypes", `마감유형 ${state.deadlineTypes.size}개`]);

  if (entries.length === 0) {
    container.appendChild(el("span", { class: "summary-empty", text: "선택된 조건이 없습니다 (전체 조회)" }));
    return;
  }
  entries.forEach(([id, text]) => {
    const removeBtn = el("button", { type: "button", text: "✕" });
    removeBtn.addEventListener("click", () => {
      removeAllInTab(id);
      renderAll();
    });
    container.appendChild(el("span", { class: "summary-chip" }, [document.createTextNode(text), removeBtn]));
  });
}

function updateOutput() {
  const data = {
    schema_version: FILTERS_SCHEMA_VERSION,
    depthTwos: Array.from(state.depthTwos),
    regions: Array.from(state.regions),
    employeeTypes: Array.from(state.employeeTypes),
    careerMin: state.careerMin,
    careerMax: state.careerMax,
    includeCareerOpen: state.includeCareerOpen,
    educations: Array.from(state.educations),
    companyTypes: Array.from(state.companyTypes),
    deadlineTypes: Array.from(state.deadlineTypes),
  };
  document.getElementById("output").value = JSON.stringify(data, null, 2) + "\n";
}

function renderAll() {
  renderTabs();
  renderContent();
  renderSummary();
  updateOutput();
}

document.getElementById("reset-btn").addEventListener("click", () => {
  state.depthTwos.clear(); state.regions.clear(); state.employeeTypes.clear();
  state.educations.clear(); state.companyTypes.clear(); state.deadlineTypes.clear();
  state.careerMin = 0; state.careerMax = CAREER_MAX; state.includeCareerOpen = true;
  renderAll();
});

document.getElementById("copy-btn").addEventListener("click", async () => {
  const text = document.getElementById("output").value;
  try {
    await navigator.clipboard.writeText(text);
  } catch (e) {
    const ta = document.getElementById("output");
    ta.select();
    document.execCommand("copy");
  }
  const msg = document.getElementById("copy-msg");
  msg.textContent = "복사됐습니다.";
  setTimeout(() => { msg.textContent = ""; }, 2000);
});

renderAll();
</script>
